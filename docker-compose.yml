services:
  telespeech-api:
    image: registry.cn-hangzhou.aliyuncs.com/ripper/telespeech-ctc:latest
    ports:
      - "8000:8000"
    environment:
      ASR_API_KEY: "${ASR_API_KEY:-}"
      RECOGNIZER_INSTANCES: "${RECOGNIZER_INSTANCES:-1}"
      RECOGNIZER_THREADS: "${RECOGNIZER_THREADS:-2}"
      INFERENCE_WORKERS: "${INFERENCE_WORKERS:-2}"
      MAX_PENDING_REQUESTS: "${MAX_PENDING_REQUESTS:-10}"
      CHUNK_SECONDS: "${CHUNK_SECONDS:-30}"
    gpus: all
    restart: unless-stopped
