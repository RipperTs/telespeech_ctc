name: Build Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: registry.cn-hangzhou.aliyuncs.com/ripper/telespeech-ctc

jobs:
  build:
    name: Build ${{ matrix.tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: float32-gpu
            runtime: gpu
            base_image: nvidia/cuda:12.8.1-cudnn-runtime-ubuntu24.04
            model_variant: float32
            latest: true
          - tag: int8-gpu
            runtime: gpu
            base_image: nvidia/cuda:12.8.1-cudnn-runtime-ubuntu24.04
            model_variant: int8
            latest: false
          - tag: int8-cpu
            runtime: cpu
            base_image: python:3.11-slim
            model_variant: int8
            latest: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.tag }}
            type=raw,value=latest,enable=${{ matrix.latest }}
            type=ref,event=tag,suffix=-${{ matrix.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            RUNTIME=${{ matrix.runtime }}
            BASE_IMAGE=${{ matrix.base_image }}
            MODEL_VARIANT=${{ matrix.model_variant }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}
